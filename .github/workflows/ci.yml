# CI mínimo y honesto: chequeo de Django + la suite, en SQLite (sin servicios).
# El camino Docker/compose se valida a mano (necesita CLIs logueados, que un runner no tiene).
name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - run: python manage.py check
      - run: python manage.py makemigrations --check --dry-run
      - run: python manage.py test enjambre -v 2
